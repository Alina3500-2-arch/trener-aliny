<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%239B7DFF'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0F1115; --card:#1A1D24; --cardAlt:#22262F; --primary:#9B7DFF; --primaryDim:#4B3E7A;
  --accent:#4FD6AC; --danger:#F08A94; --warn:#F0C36B; --text:#F2F3F5; --textDim:#9AA0AD; --line:#2A2F3A;
  --tint:#20222C; --successBg:#15241F; --dangerBg:#2A1B1D; --warnBg:#2A2416;
  --good:#57E39B; --alert:#FF6B6B; --low:#FFCE5A;
  --grad:linear-gradient(135deg,#8E74E0,#6B50C6);
  --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:ui-rounded,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px;line-height:1.4;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:inherit;font-size:16px;}
input:focus,textarea:focus{outline:none;}
#app{min-height:100vh;padding-bottom:calc(70px + var(--sab));}
.screen-scroll{-webkit-overflow-scrolling:touch;}
/* generic */
.muted{color:var(--textDim);font-size:13px;}
.h1{font-size:26px;font-weight:800;margin:0 0 4px;}
.h2{font-size:18px;font-weight:700;margin:0 0 8px;}
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--line);}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;border-radius:10px;
  padding:12px 16px;font-weight:700;font-size:15px;color:#fff;background:var(--primary);border:1px solid transparent;}
.btn:disabled{opacity:.5;}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--primary);}
.btn.soft{background:var(--cardAlt);color:var(--primary);border:1px solid var(--primaryDim);}
.btn.danger{background:var(--danger);color:#fff;}
.btn.gray{background:var(--cardAlt);color:var(--text);}
.field{width:100%;background:var(--cardAlt);border-radius:10px;padding:12px;color:var(--text);font-size:16px;border:1px solid var(--line);}
.flabel{color:var(--textDim);font-size:13px;margin:0 0 6px;display:block;}
.row{display:flex;}
.g8{gap:8px;} .g12{gap:12px;} .mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt16{margin-top:16px;}
.chip{padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--cardAlt);color:var(--text);font-size:14px;font-weight:600;}
.chip.on{border-color:var(--primary);background:var(--primaryDim);color:var(--primary);font-weight:800;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
/* tab bar */
#tabbar{position:fixed;left:0;right:0;bottom:0;height:calc(62px + var(--sab));padding-bottom:var(--sab);
  display:flex;background:var(--card);border-top:1px solid var(--line);z-index:50;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--textDim);font-size:11px;font-weight:600;padding-top:6px;}
.tab .ico{font-size:20px;opacity:.6;line-height:1;}
.tab.on{color:var(--primary);} .tab.on .ico{opacity:1;}
/* hero */
.hero{background:var(--grad);padding:calc(28px + var(--sat)) 20px 16px;border-radius:0 0 26px 26px;color:#fff;}
.hero .htitle{font-size:22px;font-weight:800;margin:0;}
.hero .hsub{font-size:13px;font-weight:600;margin-top:2px;color:rgba(255,255,255,.9);}
.body-pad{padding:12px;}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;}
.overlay.center{align-items:center;justify-content:center;padding:16px;}
.overlay.bottom{align-items:flex-end;}
.overlay.top{align-items:flex-start;justify-content:center;padding-top:56px;}
.sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;padding:20px;max-height:88vh;overflow:auto;}
.dialog{background:var(--card);border-radius:22px;width:100%;max-width:360px;padding:20px;border:1px solid var(--primaryDim);max-height:88vh;overflow:auto;}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.closeX{color:var(--textDim);font-size:22px;font-weight:700;padding:6px;}
/* calorie ring */
.ringWrap{position:relative;display:inline-block;}
.ringCenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
/* errorbox */
.errBox{background:var(--dangerBg);border:1px solid var(--danger);border-radius:10px;padding:12px;margin-top:8px;color:var(--danger);font-size:14px;}
.okBox{background:var(--successBg);border:1px solid var(--accent);border-radius:10px;padding:12px;}
.qBox{background:var(--cardAlt);border:1px solid var(--primaryDim);border-radius:16px;padding:16px;margin:8px 0;}
/* meal grid */
.grid{display:flex;flex-wrap:wrap;justify-content:space-between;}
.gridCard{width:48.5%;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px 12px;margin-bottom:8px;min-height:60px;position:relative;overflow:hidden;text-align:left;}
.gridCard.add{border-style:dashed;display:flex;align-items:center;justify-content:center;gap:6px;}
#app-error{padding:40px 20px;text-align:center;}
.spin{width:34px;height:34px;border:3px solid var(--primaryDim);border-top-color:var(--primary);border-radius:50%;animation:sp 1s linear infinite;margin:16px auto;}
@keyframes sp{to{transform:rotate(360deg);}}
.eqbar{width:6px;height:30px;border-radius:3px;background:var(--primary);animation:eq 1s ease-in-out infinite;}
@keyframes eq{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}
</style>

<script>
"use strict";
/* ===== DATA LAYER ===== */
var KEY='trener_aliny_state_v1';
var emptyState={
  onboarded:false,
  profile:{name:'Алина',sex:'f',height:165,age:30,activity:1.375},
  goal:null, customFoods:[], weights:[], meals:[], workouts:[], activities:[],
  workoutPlan:null, workoutDays:[], workoutTime:'18:00', workoutDaysSince:null, favorites:[],
  reminders:[
    {id:'weigh',label:'Взвешивание',body:'Доброе утро! Взвесься и запиши вес 💜',time:'08:00',enabled:true},
    {id:'breakfast',label:'Завтрак',body:'Что ты позавтракала? Запиши голосом 🍳',time:'10:00',enabled:true},
    {id:'lunch',label:'Обед',body:'Пора записать обед 🍲',time:'14:00',enabled:true},
    {id:'dinner',label:'Ужин',body:'Не забудь записать ужин 🍽️',time:'19:00',enabled:true},
    {id:'workout',label:'Тренировка',body:'Сегодня тренировка! Разомнёмся? 💪',time:'18:00',enabled:false},
  ],
};
function loadState(){
  try{var raw=localStorage.getItem(KEY); if(!raw) return JSON.parse(JSON.stringify(emptyState));
    var p=JSON.parse(raw); return Object.assign(JSON.parse(JSON.stringify(emptyState)),p);
  }catch(e){ return JSON.parse(JSON.stringify(emptyState)); }
}
function saveState(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
var state=loadState();

/* ===== UTILS ===== */
function todayStr(d){ d=d||new Date(); var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }
function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function enableIf(btnId,cond){ var b=document.getElementById(btnId); if(b){ if(cond) b.removeAttribute('disabled'); else b.setAttribute('disabled',''); } }
function r0(n){ return Math.round(Number(n)||0); }
function r1(n){ return +(Number(n)||0).toFixed(1); }
function addDays(s,delta){ var a=s.split('-').map(Number); var dt=new Date(a[0],a[1]-1,a[2]+delta,12,0,0);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function niceDate(s){ var a=s.split('-'); var months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return Number(a[2])+' '+months[Number(a[1])-1]+' '+a[0]; }
// день недели без getDay (Сакамото): 0=Вс..6=Сб
var DOW_T=[0,3,2,5,0,3,5,1,4,6,2,4];
function dow(year,month,day){ var y=year; if(month<3) y-=1; return (y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)+DOW_T[month-1]+day)%7; }
function dowOf(d){ return dow(d.getFullYear(),d.getMonth()+1,d.getDate()); }

/* ===== FORMULAS (storage/coach/activity) ===== */
function calcDailyKcal(profile,latestWeightKg,goal){
  var w=latestWeightKg||(goal&&goal.startWeight)||65;
  var sex=profile.sex,height=profile.height,age=profile.age,activity=profile.activity;
  var bmr=10*w+6.25*height-5*age; bmr+= sex==='m'?5:-161;
  var tdee=bmr*(activity||1.375);
  if(!goal) return Math.round(tdee);
  var totalKcalDelta=goal.targetDeltaKg*7700;
  var perDay=totalKcalDelta/Math.max(goal.periodDays,1);
  var target=tdee+perDay; var floor= sex==='m'?1500:1200;
  return Math.round(Math.max(target,floor));
}
var ACTIVITY_TYPES=[
  {key:'walk',label:'Прогулка',emoji:'🚶‍♀️',met:3.3},
  {key:'walk_fast',label:'Быстрая ходьба',emoji:'💨',met:4.5},
  {key:'run',label:'Бег',emoji:'🏃‍♀️',met:8.5},
  {key:'garden',label:'Огород / дача',emoji:'🌱',met:4.5},
  {key:'cleaning',label:'Уборка дома',emoji:'🧹',met:3.3},
  {key:'gym',label:'Зал (силовая)',emoji:'🏋️‍♀️',met:5.0},
  {key:'cardio',label:'Кардио',emoji:'🔥',met:6.5},
  {key:'bike',label:'Велосипед',emoji:'🚲',met:6.0},
  {key:'swim',label:'Плавание',emoji:'🏊‍♀️',met:6.0},
  {key:'dance',label:'Танцы',emoji:'💃',met:5.0},
  {key:'yoga',label:'Йога / растяжка',emoji:'🧘‍♀️',met:2.8},
  {key:'other',label:'Другое',emoji:'⚡',met:4.0},
];
function estimateKcal(met,minutes,weightKg){ var w=Number(weightKg)||65,m=Number(minutes)||0; return Math.round((Number(met)||0)*w*(m/60)); }
function workoutKcal(workout,weightKg){ var sets=(workout&&workout.sets&&workout.sets.length)||0; if(!sets) return 0; var minutes=Math.max(15,sets*3); return estimateKcal(5.0,minutes,weightKg); }
function burnedToday(st,dateStr,weightKg){
  var acts=(st.activities||[]).filter(function(a){return a.date===dateStr;});
  var fromActs=acts.reduce(function(s,a){return s+(Number(a.kcal)||0);},0);
  var wks=(st.workouts||[]).filter(function(w){return w.date===dateStr;});
  var fromWorkouts=wks.reduce(function(s,w){return s+workoutKcal(w,weightKg);},0);
  return Math.round(fromActs+fromWorkouts);
}
/* coach */
function latestWeight(st){ return st.weights.length?st.weights[st.weights.length-1].kg:null; }
function todayMeals(st,dateStr){ return st.meals.filter(function(m){return m.date===dateStr;}); }
function eatenToday(st,dateStr){ return todayMeals(st,dateStr).reduce(function(acc,m){acc.kcal+=m.kcal||0;acc.protein+=m.protein||0;acc.fat+=m.fat||0;acc.carbs+=m.carbs||0;return acc;},{kcal:0,protein:0,fat:0,carbs:0}); }
function dailyTarget(st){ return calcDailyKcal(st.profile,latestWeight(st),st.goal); }
function macroTargets(st){
  if(st.goal&&st.goal.macros) return st.goal.macros;
  var w=latestWeight(st)||(st.goal&&st.goal.startWeight)||65;
  var kcal=dailyTarget(st); var protein=Math.round(w*1.8),fat=Math.round(w*0.9);
  var carbs=Math.max(Math.round((kcal-protein*4-fat*9)/4),0);
  return {protein:protein,fat:fat,carbs:carbs};
}
function dayAdvanced(eatenKcal,targetKcal){ return targetKcal>0&&eatenKcal>=targetKcal*0.6; }
function macroHint(eaten,target,advanced){
  if(!target) return null;
  var pLeft=target.protein-eaten.protein;
  if(eaten.carbs>target.carbs*1.1) return {type:'warn',text:'Углеводов уже много — дальше лучше белок и овощи.'};
  if(eaten.fat>target.fat*1.15) return {type:'warn',text:'Жиров многовато — выбирай постное.'};
  if(advanced&&pLeft>25) return {type:'warn',text:'Не хватает белка (~'+Math.round(pLeft)+' г). Добавь курицу, творог, яйца или рыбу.'};
  if(pLeft<=5&&eaten.carbs<=target.carbs*1.1) return {type:'ok',text:'БЖУ в норме — так держать 👍'};
  return null;
}
function coachAdvice(st,dateStr){
  var weightKg=latestWeight(st);
  var burned=burnedToday(st,dateStr,weightKg);
  var target=dailyTarget(st)+burned;
  var eaten=eatenToday(st,dateStr).kcal;
  var left=Math.round(target-eaten);
  var hour=new Date().getHours();
  var meals=todayMeals(st,dateStr);
  var name=(st.profile&&st.profile.name)||'Алина';
  if(meals.length===0){ if(hour<11) return 'Доброе утро, '+name+'! Сначала взвесься и запиши вес, потом расскажи, что ела на завтрак.'; return name+', ты сегодня ещё ничего не записала. Расскажи, что уже ела — я посчитаю.'; }
  if(left<=0) return 'На сегодня норма уже выбрана (перебор '+Math.abs(left)+' ккал). Лучше остановиться: если очень хочется — стакан кефира или вода с лимоном.';
  if(left<100) return 'Осталось совсем немного — '+left+' ккал. Что-то лёгкое: чай без сахара, огурец или полстакана кефира (~40 ккал).';
  if(left<250) return 'Осталось '+left+' ккал — на лёгкий перекус: яблоко (~80), кефир (~80) или 100 г творога (~100 ккал).';
  if(hour>=20&&left<350) return 'До нормы осталось '+left+' ккал, и уже вечер. На ужин что-то лёгкое: творог, кефир или овощи с яйцом.';
  var meal=hour<12?'обед':hour<17?'полдник':'ужин';
  var burnPart=burned>0?'Ты сегодня активна (сожгла ~'+burned+' ккал) — можно поесть плотнее. ':'';
  return burnPart+'Отлично, '+name+'! Осталось '+left+' ккал. На '+meal+' можно нормально поесть — белок (курица/рыба/творог) + овощи, ориентируйся на ~'+Math.round(left*0.8)+' ккал.';
}
function buildStrategy(st,targetDeltaKg,periodDays){
  var w=latestWeight(st)||65;
  var goal={targetDeltaKg:targetDeltaKg,periodDays:periodDays,startWeight:w};
  var dailyKcal=calcDailyKcal(st.profile,w,goal);
  var maintenance=calcDailyKcal(st.profile,w,null);
  var deficitPerDay=Math.round(maintenance-dailyKcal);
  var losing=targetDeltaKg<0;
  var weeklyKg=(targetDeltaKg/periodDays)*7;
  var protein=Math.round(w*1.8),fat=Math.round(w*0.9);
  var carbs=Math.round((dailyKcal-protein*4-fat*9)/4);
  var lines=[
    'Цель: '+(losing?'сбросить':'набрать')+' '+Math.abs(targetDeltaKg)+' кг за '+periodDays+' дн.',
    'Это '+Math.abs(weeklyKg).toFixed(2)+' кг в неделю — '+(Math.abs(weeklyKg)<=1?'безопасный темп 👍':'темп агрессивный, но реально')+'.',
    'Твоя норма поддержания ≈ '+maintenance+' ккал.',
    (losing?'Дефицит':'Профицит')+' ≈ '+Math.abs(deficitPerDay)+' ккал/день.',
    'Ешь примерно '+dailyKcal+' ккал в день.',
    'БЖУ ориентир: белки '+protein+' г, жиры '+fat+' г, углеводы '+Math.max(carbs,0)+' г.',
    'Тренировки: 3 раза в неделю — так и мышцы сохраним, и результат быстрее.',
  ];
  var d=new Date(); var dateOnly=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return {goal:{targetDeltaKg:targetDeltaKg,periodDays:periodDays,startDate:dateOnly,startWeight:w,dailyKcal:dailyKcal,macros:{protein:protein,fat:fat,carbs:carbs}},text:lines.join('\n')};
}
/* workoutCoach */
function workoutDatesSet(wks){ return new Set((wks||[]).map(function(w){return w.date;})); }
function trainedOn(wks,dateStr){ return (wks||[]).some(function(w){return w.date===dateStr;}); }
function weekStart(d){ var x=new Date(d||new Date()); var day=(dowOf(x)+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function missedThisWeek(workoutDays,wks,since){
  if(!workoutDays||!workoutDays.length) return [];
  var done=workoutDatesSet(wks); var start=weekStart(); var today=new Date(); today.setHours(0,0,0,0); var missed=[];
  for(var i=0;i<7;i++){ var d=new Date(start); d.setDate(start.getDate()+i); if(d>=today) break; var ds=todayStr(d); if(since&&ds<since) continue; if(workoutDays.includes(dowOf(d))&&!done.has(ds)) missed.push(ds); }
  return missed;
}
function workoutCoachMsg(st){
  var wks=st.workouts||[],days=st.workoutDays||[]; var today=new Date(); var todayDow=dowOf(today);
  var didToday=trainedOn(wks,todayStr()); var missed=missedThisWeek(days,wks,st.workoutDaysSince); var scheduledToday=days.includes(todayDow);
  if(didToday) return {type:'ok',text:'Красавица, тренировка сделана! 💪 Теперь отдых и белок — творог, яйца или протеиновый коктейль восстановят мышцы.'};
  if(scheduledToday) return {type:'go',text:'Сегодня день тренировки — вперёд! 💜 Даже 20 минут лучше, чем ничего.'};
  if(missed.length) return {type:'warn',text:'Пропущено тренировок на этой неделе: '+missed.length+'. Не страшно — наверстаем сегодня-завтра!'};
  if(days.length) return {type:'rest',text:'Сегодня по плану отдых. Наберись сил и поешь как следует 🍗'};
  return {type:'rest',text:'Выбери дни тренировок ниже — я буду напоминать и следить за прогрессом.'};
}
/* exerciseMuscles */
var MUSCLE_RULES=[
  {keys:['ягодицы','ноги'],words:['присед','выпад','мостик','ягодич','мах ног','румынск','становая','зашагив','жим ног','плие','сумо','ягодичн','отведение','болгарск']},
  {keys:['ноги'],words:['икр','носки','квадрицепс','разгибание ног','сгибание ног','бедр']},
  {keys:['грудь','руки'],words:['жим лёж','жим лежа','отжим','грудь','разводк','бабочк','пуловер','брусья']},
  {keys:['пресс'],words:['планк','пресс','скручив','велосипед','вакуум','ножниц','книжк','уголок','подъём ног','подъем ног','кор ']},
  {keys:['спина'],words:['тяга','подтягив','спина','лодочк','гиперэкстенз','широчайш','шраги']},
  {keys:['руки'],words:['бицепс','трицепс','сгибание рук','разгибание рук','молот','французск']},
  {keys:['плечи'],words:['плеч','махи ганте','махи в сторон','армейск','жим ганте','жим над голов','дельт']},
  {keys:['ноги','пресс'],words:['берпи','кардио','прыж','бег','скалолаз','джампинг','бёрпи','скакалк']},
];
function musclesForExercise(text){
  var t=String(text||'').toLowerCase().replace(/ё/g,'е'); var found=new Set();
  for(var i=0;i<MUSCLE_RULES.length;i++){ var rule=MUSCLE_RULES[i]; if(rule.words.some(function(w){return t.includes(w.replace(/ё/g,'е'));})) rule.keys.forEach(function(k){found.add(k);}); }
  return found;
}
function parseExercise(text){
  var t=String(text||'').trim(); var m=t.match(/(\d+)\s*[×xх*]\s*(\d+)/);
  if(m){ var name=t.replace(m[0],'').replace(/[-–—:]+\s*$/,'').trim(); return {name:name||t,sets:m[1],reps:m[2]}; }

  var cleanName=t.replace(/\d+\s*(подход\w*|повтор\w*|раз|по|сет\w*)?/gi,'').replace(/\s+/g,' ').trim();

function calorieRingSVG(eaten,target,size,stroke,color,centerColor){
  size=size||150; stroke=stroke||20; centerColor=centerColor||'#FFFFFF';
  var ratio=0.6695; var visH=size*ratio;
  var pct=target>0?Math.min(Math.max(eaten/target,0),1):0;
  var over=color==='var(--alert)';
  var pad=30; var boxW=size+pad*2, boxH=visH+pad*2;
  var cx=pad+size/2, cy=pad+visH/2;
  var rx=(size-stroke)/2, ry=(visH-stroke)/2;
  function ptAt(deg){ var rad=deg*Math.PI/180; return [cx+rx*Math.cos(rad), cy+ry*Math.sin(rad)]; }
  var startA=135, endA=405;
  var p0=ptAt(startA), p1=ptAt(endA);
  var d='M '+p0[0].toFixed(2)+' '+p0[1].toFixed(2)+' A '+rx.toFixed(2)+' '+ry.toFixed(2)+' 0 1 1 '+p1[0].toFixed(2)+' '+p1[1].toFixed(2);
  var totalLen=0, prev=p0, N=180;
  for(var i=1;i<=N;i++){ var t=startA+(endA-startA)*i/N; var p=ptAt(t); totalLen+=Math.hypot(p[0]-prev[0],p[1]-prev[1]); prev=p; }
  var filledLen=totalLen*pct;
  var gid='rg'+Math.round(size)+(over?'o':'n'), fid='gf'+Math.round(size)+(over?'o':'n');
  var trackColor='#2E3044';
  return '<div class="ringWrap" style="width:'+size+'px;height:'+visH+'px;margin:0 4px">'+
    '<svg width="'+boxW+'" height="'+boxH+'" style="position:absolute;left:'+(-pad)+'px;top:'+(-pad)+'px">'+
    '<defs>'+
      '<linearGradient id="'+gid+'" gradientUnits="userSpaceOnUse" x1="'+p0[0].toFixed(1)+'" y1="'+p0[1].toFixed(1)+'" x2="'+p1[0].toFixed(1)+'" y2="'+p1[1].toFixed(1)+'">'+
        (over?'<stop offset="0%" stop-color="#FF6E5E"/><stop offset="55%" stop-color="#FFD2C8"/><stop offset="100%" stop-color="#FF9A8B"/>':
          '<stop offset="0%" stop-color="#7A3BE1"/><stop offset="55%" stop-color="#D6C2FF"/><stop offset="100%" stop-color="#C4A0F8"/>')+
      '</linearGradient>'+
      '<filter id="'+fid+'" x="-60%" y="-60%" width="220%" height="220%">'+
        '<feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>'+
        '<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>'+
      '</filter>'+
    '</defs>'+
    '<path d="'+d+'" fill="none" stroke="'+trackColor+'" stroke-width="'+stroke+'" stroke-linecap="round"/>'+
    '<path d="'+d+'" fill="none" stroke="url(#'+gid+')" stroke-width="'+stroke+'" stroke-linecap="round" stroke-dasharray="'+filledLen.toFixed(1)+' '+(totalLen*2).toFixed(1)+'" filter="url(#'+fid+')"/>'+
    '</svg>'+
    '<div class="ringCenter"><div style="font-size:'+Math.round(size*(String(Math.round(eaten)).length>=4?0.29:0.4))+'px;font-weight:800;color:'+centerColor+';letter-spacing:-1px;white-space:nowrap">'+Math.round(eaten)+'</div><div style="font-size:'+Math.round(size*0.12)+'px;color:rgba(255,255,255,.65);margin-top:-3px;font-weight:700">ккал</div></div>'+
  '</div>';
}

}

function obPlanFor(maintenance,deltaKg,dailyChange,sex){
  var total=Math.abs(deltaKg)*7700; var days=Math.max(Math.round(total/dailyChange),1); var floor=sex==='m'?1500:1200;
  var daily=deltaKg<0?Math.max(Math.round(maintenance-dailyChange),floor):Math.round(maintenance+dailyChange);
  return {days:days,daily:daily};
}
function obSet(k,v){ ob[k]=v; render(); }
function obSetInput(k,v){ ob[k]=v; }

      '<div class="card mt16"><p class="muted">Пол</p><div class="chips mt8" style="margin-bottom:8px">'+
        '<button class="chip'+(ob.sex==='f'?' on':'')+'" onclick="obSet(\'sex\',\'f\')">Женский</button>'+
        '<button class="chip'+(ob.sex==='m'?' on':'')+'" onclick="obSet(\'sex\',\'m\')">Мужской</button></div>'+
        '<div class="row g8"><div style="flex:1"><label class="flabel">Возраст</label><input class="field" inputmode="numeric" value="'+esc(ob.age)+'" oninput="obSetInput(\'age\',this.value)"></div>'+
        '<div style="flex:1"><label class="flabel">Рост, см</label><input class="field" inputmode="numeric" value="'+esc(ob.height)+'" oninput="obSetInput(\'height\',this.value)"></div></div>'+
        '<p class="muted mt8">Активность</p><div class="chips mt8">'+ACT_OPTS.map(function(a){return '<button class="chip'+(ob.activity===a.v?' on':'')+'" onclick="obSet(\'activity\','+a.v+')">'+a.label+'</button>';}).join('')+'</div></div>'+
      '<div class="card"><h2 class="h2">Твоя цель</h2><div class="row g8">'+
        '<div style="flex:1"><label class="flabel">Сейчас, кг</label><input class="field" inputmode="decimal" placeholder="60" value="'+esc(ob.current)+'" oninput="obSetInput(\'current\',this.value)"></div>'+

      '<button class="btn" onclick="obNext()">Показать план</button>';

      Object.assign({key:'mid',label:'Средне',hint:'оптимальный баланс'},obPlanFor(maintenance,deltaKg,500,ob.sex)),
      Object.assign({key:'fast',label:'Быстро',hint:'интенсивно'},obPlanFor(maintenance,deltaKg,750,ob.sex)),
    ]:[];
    h+='<h1 class="h1">'+(deltaKg<0?'Сбросить':'Набрать')+' '+Math.abs(deltaKg).toFixed(1)+' кг</h1>'+
      '<p style="font-size:16px;line-height:24px;margin-top:8px">Твоя норма поддержания ≈ '+maintenance+' ккал. Чтобы '+(deltaKg<0?'худеть':'набирать')+', нужен '+(deltaKg<0?'дефицит':'профицит')+'. Выбери темп:</p>';
    options.forEach(function(opt,i){

    h+='<button class="btn ghost mt8" onclick="obSet(\'step\',1)">Назад</button>';

function obNext(){
  var cur=parseFloat(String(ob.current).replace(',','.'));
  var tgt=parseFloat(String(ob.target).replace(',','.'));
  var deltaKg=cur&&tgt?tgt-cur:0;
  if(!cur||cur<30||cur>400){ alert('Укажи текущий вес.'); return; }
  if(!tgt||tgt<30||tgt>400){ alert('Укажи желаемый вес.'); return; }
  if(Math.abs(deltaKg)<0.5){ alert('Цель слишком близка к текущему весу.'); return; }
  ob.step=2; render();
}
function obChoose(i){
  var cur=parseFloat(String(ob.current).replace(',','.'));
  var tgt=parseFloat(String(ob.target).replace(',','.'));
  var deltaKg=tgt-cur;
  var profile={sex:ob.sex,age:Number(ob.age)||30,height:Number(ob.height)||165,activity:ob.activity};
  var maintenance=calcDailyKcal(profile,cur,null);
  var opts=[obPlanFor(maintenance,deltaKg,300,ob.sex),obPlanFor(maintenance,deltaKg,500,ob.sex),obPlanFor(maintenance,deltaKg,750,ob.sex)];
  var opt=opts[i];
  state.profile=Object.assign({},state.profile,profile,{name:state.profile.name||'Алина'});
  var d=todayStr(); state.weights=state.weights.filter(function(w){return w.date!==d;}); state.weights.push({date:d,kg:Number(cur.toFixed(1))}); state.weights.sort(function(a,b){return a.date.localeCompare(b.date);});
  state.goal={targetDeltaKg:Number(deltaKg.toFixed(1)),periodDays:opt.days,startDate:d,startWeight:cur,dailyKcal:opt.daily};
  state.onboarded=true;
  commit();
}

function startRec(){
  var s=ui.smart; s.errorMsg='';
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ s.errorMsg='Запись недоступна в этом браузере.'; s.phase='idle'; renderModals(); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    s.stream=stream; s.chunks=[];
    var rec; try{ rec=new MediaRecorder(stream); }catch(e){ rec=new MediaRecorder(stream,{mimeType:'audio/webm'}); }
    s.recorder=rec; s.recMime=rec.mimeType||'audio/webm';
    rec.ondataavailable=function(ev){ if(ev.data&&ev.data.size>0) s.chunks.push(ev.data); };
    rec.start(); s.phase='recording'; s.recStart=Date.now(); saRerender();
  }).catch(function(e){ s.errorMsg='Нет доступа к микрофону. Разреши в настройках.'; s.phase='idle'; renderModals(); });
}
function stopAndProcess(){
  var s=ui.smart; if(!s.recorder){ return; }
  s.phase='processing'; s.status='Распознаю речь…'; if(_timerInt) clearInterval(_timerInt); renderModals();
  s.recorder.onstop=function(){
    try{ if(s.stream) s.stream.getTracks().forEach(function(t){t.stop();}); }catch(e){}
    var mime=s.recMime||'audio/webm'; var blob=new Blob(s.chunks,{type:mime});
    var ext=mime.indexOf('mp4')>=0?'m4a':mime.indexOf('ogg')>=0?'ogg':'webm';
    transcribeAudio(blob,'audio.'+ext,mime).then(function(heard){
      if(!heard){ s.errorMsg='Речь не распознана — тихо или пусто. Скажи чуть громче.'; s.phase='idle'; renderModals(); return; }
      s.draftText=heard; return processText(heard);
    }).catch(function(e){ s.errorMsg='Ошибка: '+String(e.message||e); s.phase='idle'; renderModals(); });
  };
  try{ s.recorder.stop(); }catch(e){ s.errorMsg='Ошибка записи'; s.phase='idle'; renderModals(); }
}

  inp.onchange=function(){ var file=inp.files&&inp.files[0]; if(!file){ if(!s.photoB64){s.phase='idle'; renderModals();} return; }

    reader.onload=function(){ var url=reader.result; s.photoUri=url; s.photoB64=String(url).split(',')[1]; runPhotoDialog(s.photoB64,[]); };

function processText(text){

      if(res.meals&&res.meals.length){ s.dayMeals=res.meals.map(function(m){return Object.assign({},m,{label:(SA_MEAL_TYPES.find(function(x){return x.key===m.type;})||{}).label||m.type});}); s.phase='dayResult'; }

    }).catch(function(e){ s.errorMsg='Ошибка: '+String(e.message||e); s.draftText=t; s.phase='draft'; renderModals(); });
  }
  return parseFood(t).then(function(res){
    if(res.items&&res.items.length){ s.items=res.items; s.phase='result'; } else { s.errorMsg='Не нашла тут еды. Поправь текст.'; s.draftText=t; s.phase='draft'; } renderModals();
  }).catch(function(e){ s.errorMsg='Ошибка: '+String(e.message||e); s.draftText=t; s.phase='draft'; renderModals(); });

function continueDialog(utterance){
  var s=ui.smart; s.history=s.history.concat([utterance]);
  if(s.photoB64){ runPhotoDialog(s.photoB64,s.history); return; }
  s.phase='processing'; s.status='Считаю…'; renderModals();
  parseMeal(s.history).then(function(res){
    if(res.question){ s.question=res.question; s.phase='question'; }
    else if(res.items&&res.items.length){ s.items=res.items; s.phase='result'; }
    else { s.errorMsg='Про еду не поняла — скажи, что именно съела.'; s.phase='idle'; } renderModals();
  }).catch(function(e){ s.errorMsg='Ошибка: '+String(e.message||e); s.phase='question'; renderModals(); });

    '<span style="display:flex;align-items:center;gap:5px;color:var(--textDim);font-size:12px"><span style="width:10px;height:10px;border-radius:5px;background:var(--accent)"></span>тренировка</span>'+
    '<span style="display:flex;align-items:center;gap:5px;color:var(--textDim);font-size:12px"><span style="width:10px;height:10px;border-radius:5px;background:var(--warn)"></span>нагрузка</span>'+
    '<span style="display:flex;align-items:center;gap:5px;color:var(--textDim);font-size:12px"><span style="width:10px;height:10px;border-radius:5px;background:var(--danger)"></span>пропуск</span></div>';
  if(burnedTodayKcal>0) h+='<div style="color:var(--warn);font-weight:800;text-align:center;margin-top:8px">🔥 Сегодня сожжено: '+burnedTodayKcal+' ккал</div>';
  return h;
}
function workoutEditDone(id){ var w=state.workouts.find(function(x){return x.id===id;}); workoutOpenLogForWorkout(w); }
function workoutDelDone(id){ var w=state.workouts.find(function(x){return x.id===id;}); if(confirm('Удалить тренировку? '+w.title)) removeWorkout(id); }
function workoutActivitySection(){
  var weightKg=latestWeight(state); var todayActs=(state.activities||[]).filter(function(a){return a.date===todayStr();});
  var burnedTotal=burnedToday(state,todayStr(),weightKg); var workoutsBurn=burnedTotal-todayActs.reduce(function(s,a){return s+a.kcal;},0);
  var h='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:15px;font-weight:700">🔥 Нагрузка за день</span>'+(burnedTotal>0?'<span style="color:var(--accent);font-weight:800">+'+burnedTotal+' ккал</span>':'')+'</div>';
  todayActs.forEach(function(a){ h+='<div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)"><span style="flex:1;font-size:15px;font-weight:600">'+(a.emoji||'⚡')+' '+esc(a.name)+'</span><span class="muted" style="margin-right:12px">'+a.minutes+' мин</span><span style="color:var(--accent);font-weight:800;margin-right:8px">+'+a.kcal+' ккал</span><button style="color:var(--danger);padding:4px" onclick="removeActivity(\''+a.id+'\')">✕</button></div>'; });
  if(workoutsBurn>0) h+='<p class="muted mt8">+ тренировки сегодня ≈ '+workoutsBurn+' ккал</p>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">'+ACTIVITY_TYPES.map(function(t){return '<button style="width:31%;padding:8px;border-radius:10px;background:var(--cardAlt);border:1px solid var(--line);text-align:center" onclick="openActModal(\''+t.key+'\')"><div style="font-size:20px">'+t.emoji+'</div><div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+t.label+'</div></button>';}).join('')+'</div></div>';
  return h;
}
function openActModal(key){ ui.actModal={type:key||ACTIVITY_TYPES[0].key,min:''}; renderModals(); }
function renderActModal(){
  var am=ui.actModal; var weightKg=latestWeight(state);
  var met=(ACTIVITY_TYPES.find(function(t){return t.key===am.type;})||ACTIVITY_TYPES[0]).met;
  var est=estimateKcal(met,am.min,weightKg);
  var h='<div class="overlay center" style="z-index:105" onclick="if(event.target===this){ui.actModal=null;renderModals();}"><div class="dialog">'+
    '<div class="mhead"><div style="font-size:16px;font-weight:800">🔥 Нагрузка</div><button class="closeX" onclick="ui.actModal=null;renderModals()">✕</button></div>'+
    '<div class="chips mt8">'+ACTIVITY_TYPES.map(function(t){return '<button style="padding:5px 10px;border-radius:999px;border:1px solid '+(am.type===t.key?'var(--primary)':'var(--line)')+';background:'+(am.type===t.key?'var(--primaryDim)':'var(--cardAlt)')+';color:'+(am.type===t.key?'var(--primary)':'var(--text)')+';font-size:12px;font-weight:600" onclick="ui.actModal.type=\''+t.key+'\';renderModals()">'+t.emoji+' '+t.label+'</button>';}).join('')+'</div>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-top:16px"><input id="act-min" style="width:74px;background:var(--cardAlt);border:1px solid var(--primary);border-radius:10px;padding:8px;font-size:20px;font-weight:800;text-align:center;color:var(--text)" inputmode="numeric" placeholder="0" value="'+esc(am.min)+'" oninput="actMinInput(this.value)"><span class="muted" style="font-weight:600">мин</span><span id="act-est" style="color:var(--accent);font-size:16px;font-weight:800;margin-left:auto">≈ '+est+' ккал</span></div>'+
    '<button class="btn mt16" id="act-save-btn" onclick="actSave()" '+(am.min?'':'disabled')+'>Добавить в запас</button></div></div>';
  return h;
}
function actMinInput(v){ var m=v.replace(/[^0-9]/g,'').slice(0,3); ui.actModal.min=m; var el=document.getElementById('act-min'); if(el&&el.value!==m)el.value=m;
  var weightKg=latestWeight(state); var met=(ACTIVITY_TYPES.find(function(t){return t.key===ui.actModal.type;})||ACTIVITY_TYPES[0]).met;
  var e=document.getElementById('act-est'); if(e)e.textContent='≈ '+estimateKcal(met,m,weightKg)+' ккал';
  enableIf('act-save-btn',!!m); }
function actSave(){ var am=ui.actModal; var t=ACTIVITY_TYPES.find(function(x){return x.key===am.type;}); var weightKg=latestWeight(state); var kcal=estimateKcal(t.met,am.min,weightKg);
  if(!am.min||kcal<=0){ alert('Введи, сколько минут длилась нагрузка.'); return; }
  addActivity({key:t.key,name:t.label,emoji:t.emoji,minutes:Number(am.min),kcal:kcal}); ui.actModal=null; commit(); }
/* workout log modal */
function workoutOpenLog(dayIndex){ var day=state.workoutPlan.days[dayIndex]; var log={}; day.ex.forEach(function(e){ log[e]=[{reps:'',weight:''}]; });
  ui.wlog={title:tidyDayTitle(day.title,dayIndex),ex:day.ex.slice(),log:log,editingId:null}; renderModals(); }
function workoutOpenLogForWorkout(w){ var grouped={},order=[]; (w.sets||[]).forEach(function(s){ if(!grouped[s.exercise]){grouped[s.exercise]=[];order.push(s.exercise);} grouped[s.exercise].push({reps:s.reps?String(s.reps):'',weight:s.weight?String(s.weight):''}); });
  if(!order.length){ order.push(w.title); grouped[w.title]=[{reps:'',weight:''}]; }
  ui.wlog={title:w.title,ex:order,log:grouped,editingId:w.id}; renderModals(); }
function renderWorkoutLog(){
  var wl=ui.wlog; var weightKg=latestWeight(state);
  var exDone=function(ex){ return (wl.log[ex]||[]).some(function(s){return s.reps||s.weight;}); };
  var doneCount=wl.ex.filter(exDone).length; var progress=wl.ex.length?doneCount/wl.ex.length:0;
  var filledSets=wl.ex.reduce(function(s,ex){return s+(wl.log[ex]||[]).filter(function(x){return x.reps||x.weight;}).length;},0);
  var sessionKcal=estimateKcal(5.0,Math.max(15,filledSets*3),weightKg);
  var h='<div class="overlay bottom" style="z-index:105"><div class="sheet">'+
    '<h2 class="h2">'+esc(wl.title)+'</h2>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0 6px"><span style="font-weight:700">'+doneCount+' из '+wl.ex.length+' · '+Math.round(progress*100)+'%</span><span style="color:var(--accent);font-weight:800">🔥 ~'+sessionKcal+' ккал</span></div>'+
    '<div style="height:10px;border-radius:5px;background:var(--cardAlt);overflow:hidden;margin-bottom:12px"><div style="height:100%;width:'+Math.round(progress*100)+'%;background:'+(progress>=1?'var(--accent)':'var(--primary)')+'"></div></div>';
  wl.ex.forEach(function(e,i){
    var d=exDone(e);
    h+='<div style="background:var(--cardAlt);border:1px solid '+(d?'var(--accent)':'var(--line)')+';border-radius:16px;padding:12px;margin-bottom:8px"><div style="font-size:15px;font-weight:700">'+(d?'✅ ':'')+esc(e)+'</div>';
    (wl.log[e]||[]).forEach(function(s,si){
      h+='<div style="display:flex;align-items:center;gap:6px;margin-top:8px"><span class="muted" style="width:18px">'+(si+1)+'.</span>'+
        '<input style="width:64px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px;text-align:center;color:var(--text);font-weight:700" inputmode="numeric" placeholder="повт." value="'+esc(s.reps)+'" oninput="wlogSet('+i+','+si+',\'reps\',this.value)">'+
        '<span class="muted">×</span>'+
        '<input style="width:64px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px;text-align:center;color:var(--text);font-weight:700" inputmode="decimal" placeholder="кг" value="'+esc(s.weight)+'" oninput="wlogSet('+i+','+si+',\'weight\',this.value)"><span class="muted">кг</span>'+
        ((wl.log[e]||[]).length>1?'<button style="margin-left:auto;padding:4px;color:var(--danger);font-weight:700" onclick="wlogDelSet('+i+','+si+')">✕</button>':'')+'</div>';
    });
    h+='<button style="padding:6px 0;color:var(--primary);font-weight:700;font-size:13px" onclick="wlogAddSet('+i+')">＋ подход</button></div>';
  });
  h+='<div class="row g8 mt8"><button class="btn ghost" style="flex:1" onclick="ui.wlog=null;renderModals()">Отмена</button><button class="btn" style="flex:1" onclick="wlogFinish()">Готово</button></div></div></div>';
  return h;
}
function wlogSet(i,si,field,val){ var wl=ui.wlog; var ex=wl.ex[i]; var v=field==='reps'?val.replace(/[^0-9]/g,''):val.replace(/[^0-9.]/g,''); wl.log[ex][si][field]=v;
  // не перерисовываем на каждый символ (чтобы не терять фокус) — прогресс/галочки обновятся при +/− подхода или «Готово»
}
function wlogAddSet(i){ var ex=ui.wlog.ex[i]; ui.wlog.log[ex]=(ui.wlog.log[ex]||[]).concat([{reps:'',weight:''}]); renderModals(); }
function wlogDelSet(i,si){ var ex=ui.wlog.ex[i]; ui.wlog.log[ex]=(ui.wlog.log[ex]||[]).filter(function(_,j){return j!==si;}); renderModals(); }
function wlogFinish(){
  var wl=ui.wlog; var list=[];
  wl.ex.forEach(function(ex){ (wl.log[ex]||[]).forEach(function(s){ if(s.reps||s.weight) list.push({exercise:ex,reps:Number(s.reps)||0,weight:Number(s.weight)||0}); }); });
  if(!list.length){ alert('Отметь хотя бы один подход.'); return; }
  var weightKg=latestWeight(state);
  if(wl.editingId){ updateWorkout(wl.editingId,{title:wl.title,sets:list}); ui.wlog=null; commit(); alert('Тренировка обновлена 💜'); return; }
  var all=wl.ex.every(function(ex){return (wl.log[ex]||[]).some(function(s){return s.reps||s.weight;});});
  var est=workoutKcal({sets:list},weightKg);
  addWorkout({title:wl.title,sets:list}); ui.wlog=null; commit();
  alert((all?'🔥 Всё выполнено! Ты сделала ВСЕ упражнения! 💜':'Молодец! 💪 Тренировка записана.')+'\n\nСожжено ≈ '+est+' ккал — добавлены в запас во вкладке Питание.');
}
function afterWorkoutRender(){
  var wl=workoutLocal; if(!wl||wl.nagged) return; var plan=state.workoutPlan; var wDays=state.workoutDays||[];
  var todayDow=dowOf(new Date()); var didToday=(state.workouts||[]).some(function(w){return w.date===todayStr();});
  if(plan&&wDays.includes(todayDow)&&!didToday){ wl.nagged=true; setTimeout(function(){ alert('💪 Сегодня тренировка! По плану у тебя сегодня тренировка. Не пропускай — я в тебя верю 💜'); },300); }
}
/* ===== DEEP LINK (открыть конкретный экран по тапу на уведомление) ===== */
// Используем query-параметр (?open=...), а не #hash: переход, отличающийся
// только якорем, браузер (в т.ч. WKWebView) может обработать как навигацию
// внутри документа БЕЗ перезагрузки страницы — тогда этот код просто не
// выполнится повторно. Разница в query-строке всегда даёт полную загрузку.
function applyDeepLink(){
  if(!state.onboarded) return;
  var m=location.search.match(/[?&]open=([^&]+)/); if(!m) return;
  var val=decodeURIComponent(m[1]); if(!val) return;
  var parts=val.split(':'); var kind=parts[0], arg=parts[1];
  if(kind==='meal'&&arg){ ui.tab='today'; render(); openMealSheet(arg); }
  else if(kind==='tab'&&arg){ setTab(arg); }
  try{ history.replaceState(null,'',location.pathname); }catch(e){}
}
/* ===== BOOT ===== */
ensureFoods();
commitNoRender();
render();
applyDeepLink();
</script>
