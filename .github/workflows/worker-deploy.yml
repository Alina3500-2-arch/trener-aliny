name: Deploy Cloudflare Worker

on:
  push:
    branches: [master]
    paths:
      - "groq-proxy/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-worker-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: groq-proxy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy Worker
        run: npx --yes wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # При первом запуске Wrangler создаёт KV и вписывает его настоящий ID.
      # Сохраняем этот ID в репозитории, чтобы следующие deploy использовали
      # то же хранилище и расписание не терялось.
      - name: Save provisioned KV id
        working-directory: .
        run: |
          if git diff --quiet -- groq-proxy/wrangler.toml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add groq-proxy/wrangler.toml
          git commit -m "Сохранить ID хранилища виджета"
          git push
