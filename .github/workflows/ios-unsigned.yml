name: iOS unsigned IPA (для SideStore)

# Собирает НЕПОДПИСАННЫЙ .ipa на бесплатном Mac-сервере GitHub.
# Подпишет его SideStore на телефоне бесплатным Apple ID. Запуск — вручную (Run workflow).

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      # ИИ идёт через прокси (обход 403), ключ клиенту не нужен — он на сервере прокси.
      EXPO_PUBLIC_GROQ_PROXY: https://divine-dream-5ce0.alinatyu456.workers.dev
      PRODUCTION: "1"
      RCT_USE_PREBUILT_RNCORE: "0"
      RCT_USE_RN_DEP: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode (нужен >= 16.1)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: npm ci --no-audit --no-fund

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --no-install

      - name: CocoaPods
        run: |
          cd ios
          # PRODUCTION=1 → тянуть release-вариант Hermes (не debug) для Release-сборки.
          pod install

      - name: Build archive (без подписи)
        run: |
          set -e
          WORKSPACE=$(ls -d ios/*.xcworkspace)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace=$WORKSPACE  Scheme=$SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Собрать .ipa (Payload)
        run: |
          set -e
          APP=$(ls -d "$RUNNER_TEMP/app.xcarchive/Products/Applications/"*.app | head -1)
          echo "App=$APP"
          find "$APP/Frameworks" -maxdepth 2 -type f -print 2>/dev/null || true
          test ! -d "$APP/Frameworks/React.framework"
          test ! -d "$APP/Frameworks/ReactNativeDependencies.framework"
          test -f "$APP/main.jsbundle"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr TrenerAliny-unsigned.ipa Payload
          ls -lh TrenerAliny-unsigned.ipa

      - name: Выгрузить .ipa (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: TrenerAliny-ipa
          path: ${{ runner.temp }}/TrenerAliny-unsigned.ipa
          if-no-files-found: error

      # Публикуем .ipa как ассет GitHub Release — его можно скачать напрямую
      # (в т.ч. из автоматизации), не только через вкладку Actions.
      - name: Опубликовать .ipa в Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ipa-build-${{ github.run_number }}
          name: TrenerAliny .ipa (build ${{ github.run_number }})
          files: ${{ runner.temp }}/TrenerAliny-unsigned.ipa

      # Кладём .ipa в отдельную orphan-ветку `ipa` (force-push, всегда 1 коммит —
      # история не пухнет). Так файл доступен через обычный git fetch.
      - name: Положить .ipa в ветку ipa
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          cp "$RUNNER_TEMP/TrenerAliny-unsigned.ipa" ./TrenerAliny-unsigned.ipa
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan ipa
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f TrenerAliny-unsigned.ipa
          git commit -m "ipa build ${{ github.run_number }}"
          git push -f origin ipa
