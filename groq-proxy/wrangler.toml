name = "groq-proxy"
main = "src/index.js"
compatibility_date = "2024-11-01"

# KV для хранения данных виджета тренировок
[[kv_namespaces]]
binding = "WIDGET_KV"
id = "treneraliny_widget"
preview_id = "treneraliny_widget_preview"

# Секреты задаются командой (НЕ храним в файле):
#   npx wrangler secret put GROQ_KEY
#   npx wrangler secret put PROXY_TOKEN   (необязательно)
