name = "groq-proxy"
main = "src/index.js"
compatibility_date = "2024-11-01"

# KV для хранения данных виджета тренировок
[[kv_namespaces]]
binding = "WIDGET_KV"

# ID намеренно не указан: современный Wrangler создаст KV автоматически при
# первом deploy и запишет настоящий ID обратно в этот файл.

# Секреты задаются командой (НЕ храним в файле):
#   npx wrangler secret put GROQ_KEY
#   npx wrangler secret put PROXY_TOKEN   (необязательно)
